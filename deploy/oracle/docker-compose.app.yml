name: aegisai-app

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/aegisai-api:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    dns_opt:
      - ndots:0
    networks:
      - platform
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok) process.exit(1);}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    image: ghcr.io/${GHCR_OWNER}/aegisai-web:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - platform
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

networks:
  platform:
    external: true
    name: aegisai-platform
