name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      ghcr_owner: ${{ steps.prep.outputs.ghcr_owner }}
      image_tag: ${{ steps.prep.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          echo "ghcr_owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.ghcr_owner }}/aegisai-api:${{ steps.prep.outputs.image_tag }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.ghcr_owner }}/aegisai-web:${{ steps.prep.outputs.image_tag }}

  deploy:
    name: Deploy to Oracle Cloud VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH access
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.ORACLE_VPS_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H '${{ secrets.ORACLE_VPS_HOST }}' >> ~/.ssh/known_hosts

      - name: Create deploy path on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 '${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }}' "mkdir -p '${{ secrets.ORACLE_DEPLOY_PATH }}'"

      - name: Prepare remote deploy variables
        shell: bash
        run: |
          cat <<EOF > .oracle-deploy.env
          GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN=${{ secrets.GHCR_READ_TOKEN }}
          GHCR_OWNER=${{ needs.build-and-push.outputs.ghcr_owner }}
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          EOF

      - name: Upload deployment files
        shell: bash
        run: |
          scp -i ~/.ssh/id_ed25519 deploy/oracle/docker-compose.prod.yml deploy/oracle/deploy.sh '${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }}:${{ secrets.ORACLE_DEPLOY_PATH }}/'
          scp -i ~/.ssh/id_ed25519 .oracle-deploy.env '${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }}:${{ secrets.ORACLE_DEPLOY_PATH }}/.oracle-deploy.env'

      - name: Deploy over SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 '${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }}' "cd '${{ secrets.ORACLE_DEPLOY_PATH }}' && set -a && . ./.oracle-deploy.env && set +a && sh ./deploy.sh && rm -f ./.oracle-deploy.env"
