services:
  postgres:
    image: postgres:16-alpine
    container_name: aegisai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aegisai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aegisai-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
